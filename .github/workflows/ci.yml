name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      # ── 全 Action は commit SHA でピン留め (タグ retag によるサプライチェーン攻撃を防ぐ)。
      # release.yml と同じバージョン (v4 系は Node.js 20 ベースで 2026-09-16 に runner から
      # 削除予定のため、Node.js 24 ベースの v6 系に上げている)。
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up pnpm
        # pnpm/action-setup@v6.0.8 — version は package.json の packageManager から取る
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Set up Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # main ブランチ上 / PR 内では package.json.version と src/version.ts の
      # VERSION が常に "0.0.0-development" に固定されていなければならない。
      # 実際の値は release.yml が tag から bake する。ここでハンド bump を弾く。
      - name: Verify version is pinned to placeholder
        run: node scripts/release-version.mjs --check

      - name: Run type check
        run: pnpm run check-types

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test
