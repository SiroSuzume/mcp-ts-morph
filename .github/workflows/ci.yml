name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # main ブランチ上 / PR 内では package.json.version と src/version.ts の
      # VERSION が常に "0.0.0-development" に固定されていなければならない。
      # 実際の値は release.yml が tag から bake する。ここでハンド bump を弾く。
      - name: Verify version is pinned to placeholder
        run: node scripts/release-version.mjs --check

      - name: Run type check
        run: pnpm run check-types

      - name: Run lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test
