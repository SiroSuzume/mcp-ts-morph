name: Release Package

# vX.Y.Z 形式のタグ push でトリガー。
# Git tag が唯一のバージョンの真実の source。package.json と src/version.ts は
# 0.0.0-development に固定されており、この workflow が tag から値を bake する。
on:
  push:
    tags:
      - 'v*.*.*'

# 同一タグの重複実行を防ぐ。新しい push が優先。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # npm の Trusted Publishing (OIDC) と provenance のために必須。
      # NPM_TOKEN を廃止し、短命 OIDC ID Token で publish するためここが唯一の認可資産。
      id-token: write
    timeout-minutes: 15
    steps:
      # ── 全 Action は commit SHA でピン留め (タグ retag によるサプライチェーン攻撃を防ぐ) ──
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # pnpm/action-setup@v6.0.8 — version は package.json の packageManager から取る
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Setup Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Trusted Publishing は Node 22.14+ を要求するため CI 上だけ override。
          # package.json の volta (Node 20.x) はローカル開発のため温存。
          # registry-url はあえて指定しない: setup-node が registry-url を解釈すると
          # ~/.npmrc に `_authToken=${NODE_AUTH_TOKEN}` を書き込み、OIDC ではなく
          # 空 token 経路で auth attempt → 404 になっていた (修正前の失敗主因)。
          node-version: '22'
          cache: pnpm

      - name: Upgrade npm to >= 11.5.1 for trusted publishing
        # Trusted Publishing は npm CLI 11.5.1 で正式 GA。
        # pnpm publish は内部的に npm CLI を利用するため、npm 本体を最新化しておく。
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: get_version
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag version ($VERSION) does not match the expected format (X.Y.Z)."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # tag 値を src/version.ts と package.json に焼き込む。
      # - src/version.ts: serverInfo.version の source。tsc がそのまま dist に取り込む。
      # - package.json:   npm registry 上の version。pnpm publish が読み取る。
      # この 2 つは同じ tag 値で更新されるので、bump 漏れが構造的に発生しない。
      - name: Bake VERSION from tag
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          # src/version.ts の "0.0.0-development" リテラルを置換
          sed -i 's/export const VERSION = "0\.0\.0-development";/export const VERSION = "'"$VERSION"'";/' src/version.ts
          grep -q "export const VERSION = \"$VERSION\";" src/version.ts || {
            echo "Error: failed to bake VERSION into src/version.ts"
            cat src/version.ts
            exit 1
          }
          # package.json "version" を jq で書き換え (空白・構造を保持)
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "Baked version: $VERSION"
          echo "--- src/version.ts ---"
          cat src/version.ts
          echo "--- package.json (version line) ---"
          jq '.version' package.json

      - name: Build package
        run: pnpm run build

      - name: Test package
        run: pnpm run test

      # dist にバージョン文字列が確かに焼き込まれているか確認 (drift 検出)。
      # ここで失敗するなら build 設定か bake step に問題がある。
      - name: Verify baked version landed in dist
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          if ! grep -q "\"$VERSION\"" dist/version.js; then
            echo "Error: dist/version.js does not contain expected version '$VERSION'"
            cat dist/version.js
            exit 1
          fi
          echo "dist/version.js contains the expected VERSION ($VERSION)."

      - name: Publish to npm (pnpm + Trusted Publishing via OIDC)
        # サプライチェーン攻撃対策の観点から publish も pnpm 経由に統一。
        # pnpm 11+ の native publish 実装が内部で npm CLI 11.5+ の OIDC 経路を使う。
        # --no-git-checks: CI では Git 状態チェックをスキップ
        # --provenance: GitHub Actions の OIDC + Sigstore で出所証明を発行
        # --access public: スコープ付きパッケージを公開
        run: pnpm publish --no-git-checks --provenance --access public
