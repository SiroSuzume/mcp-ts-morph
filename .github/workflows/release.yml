name: Release Package

# vX.Y.Z 形式 (leading-zero / プレリリース / build metadata なし) のタグ push でトリガー。
# Git tag が唯一のバージョンの真実の source。package.json と src/version.ts は
# 0.0.0-development に固定されており、この workflow が tag から値を bake する。
#
# プレリリース (v1.2.0-rc.1 等) は意図的に未サポート。サポートしたくなったら
# (1) ここの glob、(2) scripts/release-version.mjs の STRICT_SEMVER、
# (3) SKILL.md / README を一緒に更新すること。
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# 同一タグの重複実行を防ぐ。新しい push が優先。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # npm の Trusted Publishing (OIDC) と provenance のために必須。
      # NPM_TOKEN を廃止し、短命 OIDC ID Token で publish するためここが唯一の認可資産。
      id-token: write
    timeout-minutes: 15
    steps:
      # ── 全 Action は commit SHA でピン留め (タグ retag によるサプライチェーン攻撃を防ぐ) ──
      - name: Checkout code
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup pnpm
        # pnpm/action-setup@v6.0.8 — version は package.json の packageManager から取る
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093

      - name: Setup Node.js
        # actions/setup-node@v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          # Trusted Publishing は Node 22.14+ を要求するため CI 上だけ override。
          # package.json の volta (Node 20.x) はローカル開発のため温存。
          # registry-url はあえて指定しない: setup-node が registry-url を解釈すると
          # ~/.npmrc に `_authToken=${NODE_AUTH_TOKEN}` を書き込み、OIDC ではなく
          # 空 token 経路で auth attempt → 404 になっていた (修正前の失敗主因)。
          node-version: '22'
          cache: pnpm

      - name: Upgrade npm to >= 11.5.1 for trusted publishing
        # Trusted Publishing は npm CLI 11.5.1 で正式 GA。
        # pnpm publish は内部的に npm CLI を利用するため、npm 本体を最新化しておく。
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from tag
        id: get_version
        # SemVer 2.0.0 §2 準拠 (leading zero 禁止)。プレリリース・build metadata 不可。
        # scripts/release-version.mjs の STRICT_SEMVER と同じパターン。
        run: |
          set -euo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ ! "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Error: Tag version ($VERSION) is not a strict SemVer X.Y.Z (no leading zeros, no prerelease, no build metadata)."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Bake より先に test を走らせる理由:
      # - test は placeholder バージョン (0.0.0-development) を前提に書かれている。
      # - 将来 serverInfo.version の snapshot test が増えた場合に、bake 後の値で
      #   毎リリースが fail することを防ぐ (snapshot trap 対策)。
      - name: Test package (before bake — uses placeholder VERSION)
        run: pnpm run test

      # tag 値を src/version.ts と package.json に焼き込む。
      # node script で実装している理由は scripts/release-version.mjs の冒頭コメント参照。
      # 要点: sed / jq は formatter ルールに脆く、no-op が silent になりやすい。
      - name: Bake VERSION from tag
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/release-version.mjs --bake "$VERSION"
          echo "--- src/version.ts ---"
          cat src/version.ts
          echo "--- package.json (version) ---"
          node -e 'process.stdout.write(JSON.parse(require("node:fs").readFileSync("package.json","utf8")).version + "\n")'

      - name: Build package (with baked VERSION)
        run: pnpm run build

      # dist に baked version が完全一致で含まれることを確認 (drift 検出)。
      # grep は -F (fixed string) + 完全な代入行で照合し、無関係な substring match を防ぐ。
      - name: Verify baked version landed in dist
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail
          expected="exports.VERSION = \"${VERSION}\";"
          if ! grep -qF "$expected" dist/version.js; then
            echo "Error: dist/version.js does not contain the exact line:"
            echo "  $expected"
            echo "--- dist/version.js ---"
            cat dist/version.js
            exit 1
          fi
          echo "dist/version.js contains the expected line: $expected"

      # publish 直前に internal-only な _version_note を除去 (npm registry に
      # 内部スキルパスを露出させない)。`pnpm pkg` は pnpm v11 時点で未実装
      # (ERR_PNPM_NOT_IMPLEMENTED) なので npm CLI の `npm pkg` を直接呼ぶ。
      # package.json を in-place で書き換える。
      - name: Strip internal _version_note before publish
        run: npm pkg delete _version_note

      - name: Publish to npm (pnpm + Trusted Publishing via OIDC)
        # サプライチェーン攻撃対策の観点から publish も pnpm 経由に統一。
        # pnpm 11+ の native publish 実装が内部で npm CLI 11.5+ の OIDC 経路を使う。
        # --no-git-checks: CI では Git 状態チェックをスキップ
        # --provenance: GitHub Actions の OIDC + Sigstore で出所証明を発行
        # --access public: スコープ付きパッケージを公開
        #
        # NOTE: package.json scripts.prepublishOnly が `pnpm run build` を再度
        # 走らせるため、tsc が再実行され dist が再生成される。これは Bake 後の
        # src/version.ts を再び読むので結果は同一だが、Verify step が見たビルドと
        # 実際に publish されるビルドは厳密には別物 (build #1 vs #2)。今は
        # bake 機構がディスク mutation なので問題ないが、将来 bake を別方式
        # (transformer 等) に変える場合は prepublishOnly の挙動も併せて見直すこと。
        run: pnpm publish --no-git-checks --provenance --access public
